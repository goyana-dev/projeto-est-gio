<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Área de administrador</title>

    <link rel="stylesheet"
    href="CSS(ADMIN)/admin.css">
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

    <main class="container">

        <h1>CADASTRE-SE</h1>

        <!-- INPUT USUÁRIO -->
        <label id="usuario">
            Usuário
        </label>

        <input
        type="text"
        id="usuario"
        placeholder="Digite o usuário">

        <!-- INPUT SENHA -->
     <label for="senha">Senha</label>

<div class="senhabox">

    <input
    type="password"
    id="senha"
    placeholder="Digite a senha">

    <button
    type="button"
    onclick="MostrarSenha()"
    class="btn-senha">

        <i class="fa-solid fa-eye-slash" id="iconeSenha"></i>

    </button>

</div>
      
       
        </div>

        <!-- BOTÃO -->
        <button onclick="cadastrarAdministrador()">
            Cadastrar
        </button>

        <!-- MENSAGEM -->
        <p id="mensagem"></p>

    </main>

    <script src="JS(ADMIN)/admin.js"></script>

</body>
</html>
